<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pousada Diamante – São João Batista do Glória</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Josefin+Sans:wght@200;300;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --verde: #2A8A6E;
      --verde-dark: #1A5C49;
      --verde-light: #4AB896;
      --verde-pale: #A8DFD0;
      --cream: #F0FAF6;
      --gold: #2A9A7A;
      --gold-light: #6EDCBB;
      --dark: #0E2A22;
      --text: #103D2E;
      --white: #FFFFFF;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Josefin Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, var(--verde-dark) 0%, var(--verde) 45%, var(--verde-light) 100%);
      overflow: hidden;
      text-align: center;
      padding: 60px 24px;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='60' cy='60' r='58' fill='none' stroke='rgba(255,255,255,0.04)' stroke-width='1'/%3E%3Ccircle cx='60' cy='60' r='40' fill='none' stroke='rgba(255,255,255,0.03)' stroke-width='1'/%3E%3C/svg%3E");
      background-size: 120px 120px;
      opacity: 0.6;
    }

    .hero-noise {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
      opacity: 0.4;
    }

    .hero-badge {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 200;
      font-size: 11px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--verde-pale);
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 0.8s 0.2s forwards;
    }

    .hero-logo-wrap {
      width: 200px;
      height: 200px;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp 0.8s 0.4s forwards;
      position: relative;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid rgba(255,255,255,0.5);
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      background: white;
    }

    .hero-logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(48px, 10vw, 90px);
      color: var(--white);
      line-height: 0.9;
      letter-spacing: -0.01em;
      opacity: 0;
      animation: fadeUp 0.8s 0.6s forwards;
    }

    .hero h1 em {
      font-style: italic;
      font-weight: 300;
      color: var(--gold-light);
    }

    .hero-divider {
      width: 60px;
      height: 1px;
      background: var(--gold-light);
      margin: 28px auto;
      opacity: 0;
      animation: fadeUp 0.8s 1s forwards;
    }

    .hero-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(16px, 4vw, 22px);
      color: rgba(255,255,255,0.85);
      max-width: 480px;
      line-height: 1.6;
      opacity: 0;
      animation: fadeUp 0.8s 1.2s forwards;
    }

    /* Estilo do novo botão de avaliações */
    .cta-btn {
      display: inline-block;
      padding: 14px 30px;
      background: rgba(255,255,255,0.1);
      color: white;
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border: 1px solid var(--gold-light);
      border-radius: 2px;
      margin-top: 25px;
      transition: all 0.3s ease;
      opacity: 0;
      animation: fadeUp 0.8s 1.4s forwards;
    }

    .cta-btn:hover {
      background: var(--gold-light);
      color: var(--verde-dark);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── SECTIONS ── */
    section {
      padding: 80px 24px;
      max-width: 760px;
      margin: 0 auto;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: #1A5C49;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(32px, 7vw, 52px);
      font-weight: 300;
      line-height: 1.1;
      color: var(--verde-dark);
      margin-bottom: 24px;
    }
